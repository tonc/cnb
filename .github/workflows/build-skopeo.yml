name: Build Latest Skopeo

# 触发条件：手动触发 + 每周自动构建
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

# 极简权限配置（仅保留必需项，无任何无效字段）
permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build-skopeo:
    name: Build Skopeo (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout Skopeo Source
        uses: actions/checkout@v4
        with:
          repository: containers/skopeo
          ref: main
          path: skopeo

      - name: Install System Dependencies
        run: |
          sudo apt update && sudo apt install -y \
            gcc make libgpgme-dev libassuan-dev libbtrfs-dev libdevmapper-dev \
            pkg-config go-md2man qemu-user-static gcc-aarch64-linux-gnu

      - name: Set Up Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: true
          cache-dependency-path: skopeo/go.mod

      - name: Build Skopeo Binary
        run: |
          cd skopeo
          # 跨架构编译配置
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export GOARCH=arm64
            export CC=aarch64-linux-gnu-gcc
          else
            export GOARCH=amd64
          fi
          export CGO_ENABLED=1
          # 编译
          make binary
          # 验证
          ./skopeo --version
          file ./skopeo

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: skopeo-linux-${{ matrix.arch }}
          path: skopeo/skopeo
          retention-days: 30

      # 可选：推送至 Release（如需长期存储）
      - name: Upload to GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt install -y gh
          mv skopeo/skopeo skopeo-linux-${{ matrix.arch }}
          gh release create "skopeo-latest" --draft --title "Latest Skopeo" || true
          gh release upload "skopeo-latest" skopeo-linux-${{ matrix.arch }} --clobber
