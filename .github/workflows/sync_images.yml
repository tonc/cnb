name: Sync Docker Images

on:
  schedule:
    - cron: '0 2 * * *'  # 每天UTC时间2点运行
  workflow_dispatch:     # 允许手动触发
  push:
    branches:
      - main
    paths:
      - 'images.txt' # 修改images.txt时触发

jobs:
  sync-images:
    runs-on: ubuntu-latest
    container:
      image: quay.io/skopeo/stable:latest
      options: --user root

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      run: |
        apt-get update
        apt-get install -y python3 python3-pip
        pip3 install --upgrade pip
        pip3 install requests

    - name: Login to docker.cnb.cool
      env:
        DOCKER_REGISTRY_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
      run: |
        skopeo login -u cnb docker.cnb.cool -p $DOCKER_REGISTRY_TOKEN

    - name: Run image sync
      env:
        DOCKER_REGISTRY_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
        DOCKER_REGISTRY_GROUP: ${{ secrets.DOCKER_REGISTRY_GROUP }}
      run: |
        python3 docker_image_sync.py
